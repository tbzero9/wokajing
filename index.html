<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBZ09 服务器官网 | 我的世界服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0e14 0%, #1a1e2a 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: #f0f3fa;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.6s ease-out;
        }

        .logo-wrapper {
            width: 300px;  /* 翻倍：原130px → 260px */
            margin: 0 auto 1rem;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: transform 0.2s;
        }
        .logo-wrapper:hover {
            transform: scale(1.02);
        }
        .logo-wrapper svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .server-name {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd20c, #ff6834);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .ip-box {
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            margin-top: 0.8rem;
            border: 1px solid rgba(255,104,52,0.5);
            backdrop-filter: blur(4px);
        }
        .ip-box span {
            color: #ffd20c;
            font-weight: bold;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(18, 22, 32, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            padding: 1.8rem;
            border: 1px solid rgba(255,104,52,0.3);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            border-color: #ff6834;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            border-left: 5px solid #ffd20c;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ========= 竖向柱状图排行榜 ========= */
        .rank-list {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            gap: 1.5rem;
            padding: 1rem 0 0.5rem;
            flex-wrap: wrap;
        }
        .rank-item {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            min-width: 70px;
        }
        .bar-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            height: 180px; /* 固定高度，方便柱状图比例 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
            position: relative;
        }
        .bar-fill {
            background: linear-gradient(0deg, #ff6834, #ffd20c);
            width: 100%;
            height: 0%;
            transition: height 0.5s ease;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: #0a0c10;
            font-weight: bold;
            font-size: 0.8rem;
            padding-top: 4px;
        }
        .rank-number {
            width: 32px;
            height: 32px;
            background: #ff6834;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a0c10;
        }
        .rank-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .rank-value {
            font-weight: 700;
            color: #ffd20c;
            font-size: 0.9rem;
        }

        /* 两列布局（线路图 + 新闻） */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        /* 新闻列表样式 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .news-item {
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .news-date {
            font-size: 0.75rem;
            color: #ff6834;
            letter-spacing: 1px;
        }
        .news-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0.3rem 0;
        }
        .news-desc {
            font-size: 0.9rem;
            color: #cbd5e6;
            line-height: 1.4;
        }

        /* 按钮区域（B站 + 爱发电）*/
        .banner {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .bilibili-btn, .afdian-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .bilibili-btn {
            background: #00a1d6;
        }
        .bilibili-btn:hover {
            background: #0082b3;
            transform: translateY(-2px);
        }
        .afdian-btn {
            background: #946ce6;
        }
        .afdian-btn:hover {
            background: #7b52c7;
            transform: translateY(-2px);
        }

        /* 底部 */
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            color: #7f8c9a;
        }

        @media (max-width: 800px) {
            .two-columns {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .server-name {
                font-size: 1.8rem;
            }
            .logo-wrapper {
                width: 180px; /* 移动端适当缩小，但仍比原130px大 */
            }
            body {
                padding: 1rem;
            }
            .rank-list {
                flex-direction: column;
                align-items: stretch;
            }
            .rank-item {
                flex-direction: row;
                justify-content: space-between;
                gap: 1rem;
            }
            .bar-container {
                height: 40px;
                width: 60%;
            }
            .bar-fill {
                border-radius: 12px;
                height: 100% !important;
                width: 0%;
                background: linear-gradient(90deg, #ff6834, #ffd20c);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 LOGO + 服务器信息 -->
    <div class="hero">
        <div class="logo-wrapper">
            <!-- 更新版 LOGO (已移除位图，纯矢量) -->
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <path fill="#ff6834" d="m 95,132.5 -10,20.66802 -3e-6,36.83198 C 84.999996,215 115,215 115,215 v -20 h -10 v -45 h 90 v 45 h -10 v 20 c 0,0 30,0 30,-25 v -37.5 l -10,-20 -40,0 -1.25,2.5 h -30 l -1.25,-2.5 z" />
                <path fill="#ffd20c" d="m 138.75019,79.999768 -1.25006,2.500106 v 40.000146 l 1.25006,2.5001 L 156.29034,125 162.5,112.5 V 110 l -3.6636,-7.5 v 0 l 3.66376,-7.500114 V 92.49978 l -6.25027,-12.500012 h -6.24974 z m 6.24974,7.500317 h 7.50032 l 2.49959,4.999695 v 2.500106 l -2.49959,5.000214 h -7.50032 z M 145,105 h 7.50032 l 2.49959,5.00021 v 2.50011 l -2.49959,4.99969 H 145 Z" />
                <path fill="#ffd20c" d="m 85.000001,80.000001 0,49.999999 48.749979,-1.8e-4 1.25005,2.5001 h 27.50013 l 1.25005,-2.5001 H 214.9998 V 79.999768 h -17.49971 l 4.99969,10.000423 V 102.5002 L 191.37695,110 h 11.12283 v 15.00012 h -42.49973 l -1.25005,2.50011 h -2.50011 -17.4997 -2.50011 l -1.25005,-2.50011 V 102.5002 h -9.99991 v 22.49992 H 110 V 102.5002 H 97.499992 V 90.000191 L 102.5002,79.999768 Z" />
                <path fill="#ff6834" d="m 120,195 h 10 v -40 h 10 l 10,20 0,15 c 0,25 -30,25 -30,25 z" />
                <path fill="#ff6834" d="m 150,155 15,30 h 25 v -20 h -15 l -7.5,-15 h -20 z" />
                <path fill="#ff6834" d="M 100,89.999999 V 100 h 12.5 l 0,22.5 h 10 l 0.052,-22.5 H 135 V 89.999999 Z" />
                <path fill="#ff6834" d="M 165,89.999999 V 100 h 20 l -20,12.5 v 10 h 35 v -10 H 182.5 L 200,100 V 89.999999 Z" />
                <path fill="#ffd20c" d="M 177.13121,102.5 165,110 l -3.27386,-7.5 z" />
            </svg>
        </div>
        <h1 class="server-name">TBZ 零玖轨交</h1>
        <div class="ip-box">
            🎮 服务器地址：<span>play.simpfun.cn:35667</span>
        </div>
    </div>

    <!-- 排行榜（竖向柱状图）单独一行，共7人 -->
    <div class="card" style="margin-bottom: 2rem;">
        <div class="card-title">
            📊 本周贡献值排行
        </div>
        <div id="rankContainer" class="rank-list">
            <!-- 动态生成竖向柱状图 -->
        </div>
        <div style="margin-top: 1.5rem; font-size:0.75rem; text-align:center; opacity:0.6;">
            ✨ 数据每日手动更新 | 感谢支持
        </div>
    </div>

    <!-- 两列布局：线路图 + 简讯 -->
    <div class="two-columns">
        <!-- 左侧：线路图模块（3:4 竖长方形）-->
        <div class="card" style="padding: 1rem;">
            <h3 style="margin-bottom: 1rem; font-size: 1.3rem; color: #ffd20c; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;">
                🗺️ 线路图
            </h3>
            <div id="mtr-map-inner">
                <div id="mtr-loading" style="padding: 2rem; text-align: center; color: #ffd20c;">🚇 正在加载线路图...</div>
                <div id="iframe-wrapper" style="position: relative; width: 100%; padding-bottom: 133.33%; /* 3:4 比例 */ background: #0a0c12; border-radius: 1rem; overflow: hidden; display: none;">
                    <iframe id="mtr-iframe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #0a0c12;"></iframe>
                </div>
                <div id="mtr-fallback" style="padding: 2rem; text-align: center; color: #ffa500; display: none;">⚠️ 线路图显示失败！请打开客户端以查看线路图</div>
            </div>
        </div>

        <!-- 右侧：简讯（原新闻公告） -->
        <div class="card">
            <div class="card-title">
                📢 简讯
            </div>
            <div id="newsContainer" class="news-list">
                <!-- 动态生成新闻列表 -->
            </div>
        </div>
    </div>

    <!-- B站 + 爱发电按钮 -->
    <div class="banner">
        <a href="https://space.bilibili.com/3546939914193630?spm_id_from=333.788.0.0" target="_blank" class="bilibili-btn">
            🎬 B站主页
        </a>
        <a href="https://ifdian.net/a/wokajing_yyn" target="_blank" class="afdian-btn">
            ❤️ 爱发电支持
        </a>
    </div>

    <div class="footer">
        © 2026 TBZ 服务器 | 打野的走位我就觉得你麻痹离谱
    </div>
</div>

<script>
    // ======================== 数据配置区域 ========================
    // 排行榜数据 (前七名) - 格式: { name: "玩家名", value: 贡献值 }
    const rankData = [
        { name: "cnmself", value: 15 },
        { name: "MCfanfan11", value: 15 },
        { name: "-", value: 0 },
        { name: "-", value: 0 },
        { name: "-", value: 0 },
        { name: "-", value: 0 },
        { name: "-", value: 0 }
    ];
    
    // 新闻数据 (按时间倒序，最新在上)
    const newsData = [
        {
            date: "2026.03.27",
            title: "⚡官网已成立",
            desc: "感谢TBzero9提供灵感"
        },
        {
            date: "2026.03.22",
            title: "🎉服务器独立日 ",
            desc: "从轻蓝附属子服务器正式蜕变为独立运营的服务器"
        },
        {
            date: "2026.03.14",
            title: "🎉服务器正式开放",
            desc: "全新地形模组，精简版轻蓝整合包，建筑者集结！"
        }
    ];
    
    // ======================== 渲染函数 ========================
    
    // 渲染竖向柱状图排行榜
    function renderRanking() {
        const container = document.getElementById('rankContainer');
        if (!container) return;
        
        // 找出最大值（至少1，避免除零）
        const maxValue = Math.max(...rankData.map(item => item.value), 1);
        
        let html = '';
        rankData.forEach((item, index) => {
            const percent = (item.value / maxValue) * 100;
            html += `
                <div class="rank-item">
                    <div class="rank-number">${index + 1}</div>
                    <div class="bar-container">
                        <div class="bar-fill" style="height: ${percent}%;">
                            ${percent > 10 ? Math.round(percent) + '%' : ''}
                        </div>
                    </div>
                    <div class="rank-name">${escapeHtml(item.name)}</div>
                    <div class="rank-value">${item.value}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // 渲染新闻列表
    function renderNews() {
        const container = document.getElementById('newsContainer');
        if (!container) return;
        
        let html = '';
        newsData.forEach(news => {
            html += `
                <div class="news-item">
                    <div class="news-date">${escapeHtml(news.date)}</div>
                    <div class="news-title">${escapeHtml(news.title)}</div>
                    <div class="news-desc">${escapeHtml(news.desc)}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // 简单的防XSS函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // 初始化页面
    renderRanking();
    renderNews();

    // 线路图加载逻辑
    (function() {
        const iframe = document.getElementById('mtr-iframe');
        const loading = document.getElementById('mtr-loading');
        const fallback = document.getElementById('mtr-fallback');
        const wrapper = document.getElementById('iframe-wrapper');
        const url = 'http://localhost:1025/';

        fetch(url, { mode: 'no-cors', cache: 'no-store' })
            .then(() => {
                loading.style.display = 'none';
                wrapper.style.display = 'block';
                iframe.src = url;
            })
            .catch(() => {
                loading.style.display = 'none';
                fallback.style.display = 'block';
            });

        setTimeout(() => {
            if (loading.style.display !== 'none' && wrapper.style.display !== 'block' && fallback.style.display !== 'block') {
                loading.style.display = 'none';
                fallback.style.display = 'block';
            }
        }, 5000);
    })();
</script>
</body>
</html>
