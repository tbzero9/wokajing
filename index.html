<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBZ09 服务器官网 | 我的世界服务器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0e14 0%, #1a1e2a 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: #f0f3fa;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.6s ease-out;
        }

        .logo-wrapper {
            width: 130px;
            margin: 0 auto 1rem;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: transform 0.2s;
        }
        .logo-wrapper:hover {
            transform: scale(1.02);
        }
        .logo-wrapper svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .server-name {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd20c, #ff6834);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .ip-box {
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            margin-top: 0.8rem;
            border: 1px solid rgba(255,104,52,0.5);
            backdrop-filter: blur(4px);
        }
        .ip-box span {
            color: #ffd20c;
            font-weight: bold;
        }

        /* 两列布局 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(18, 22, 32, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            padding: 1.8rem;
            border: 1px solid rgba(255,104,52,0.3);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            border-color: #ff6834;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            border-left: 5px solid #ffd20c;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 排行榜柱状图样式 */
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .rank-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .rank-number {
            width: 32px;
            height: 32px;
            background: #ff6834;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a0c10;
            flex-shrink: 0;
        }
        .rank-name {
            width: 100px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bar-container {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 28px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill {
            background: linear-gradient(90deg, #ffd20c, #ff6834);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: #0a0c10;
            font-weight: bold;
            font-size: 0.8rem;
            transition: width 0.5s ease;
        }
        .rank-value {
            min-width: 60px;
            text-align: right;
            font-weight: 700;
            color: #ffd20c;
        }

        /* 新闻列表 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .news-item {
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .news-date {
            font-size: 0.75rem;
            color: #ff6834;
            letter-spacing: 1px;
        }
        .news-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0.3rem 0;
        }
        .news-desc {
            font-size: 0.9rem;
            color: #cbd5e6;
            line-height: 1.4;
        }

        /* B站按钮区域 */
        .banner {
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .bilibili-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #00a1d6;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .bilibili-btn:hover {
            background: #0082b3;
            transform: translateY(-2px);
        }

        /* 底部 */
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            color: #7f8c9a;
        }

        @media (max-width: 800px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .server-name {
                font-size: 1.8rem;
            }
            .logo-wrapper {
                width: 90px;
            }
            body {
                padding: 1rem;
            }
            .rank-name {
                width: 70px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

        </div>
        <h1 class="server-name">TBZ 零玖轨交</h1>

    <!-- 主体内容：左右布局 -->
    <div class="dashboard">
        <!-- 左侧：柱状图贡献值排行榜 -->
        <div class="card">
            <div class="card-title">

            <div id="rankContainer" class="rank-list">
                <!-- 动态生成排行榜柱状图 -->
            </div>
            <div style="margin-top: 1rem; font-size:0.75rem; text-align:center; opacity:0.6;">
                ✨ 数据每日手动更新 | 感谢支持
            </div>

        <!-- 右侧：新闻发布页 -->
        <div class="card">
            <div class="card-title">
                📢 最新公告
            </div>
            <div id="newsContainer" class="news-list">
                <!-- 动态生成新闻列表 -->
            </div>
        </div>

    <div class="banner" style="display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; margin-top: 2rem;">
    <a href="https://space.bilibili.com/3546939914193630?spm_id_from=333.788.0.0" target="_blank" class="bilibili-btn" style="display: inline-flex; align-items: center; gap: 10px; background: #00a1d6; padding: 0.8rem 2rem; border-radius: 60px; font-weight: bold; font-size: 1.1rem; text-decoration: none; color: white; transition: transform 0.2s;">

    <div class="footer">
        © 2026 TBZ 服务器 | 打野的走位我就觉得你麻痹离谱
    </div>

<script>
    // ======================== 数据配置区域 ========================
    // 修改这里的数据即可更新排行榜和新闻内容
    
    // 排行榜数据 (前五名) - 格式: { name: "玩家名", value: 贡献值 }
    const rankData = [
        { name: "cnmself", value: 15 },
        { name: "MCfanfan11", value: 15 },
        { name: "-", value: 0 },
        { name: "-", value: 0 },
        { name: "-", value: 0 }
    ];
    
    // 新闻数据 (按时间倒序，最新在上)
    const newsData = [
        {
            date: "2026.03.27",
            title: "⚡官网已成立",
            desc: "感谢TBzero9提供灵感"
        },
        {
            date: "2026.03.22",
            title: "🎉服务器独立日 ",
            desc: "从轻蓝附属子服务器正式蜕变为独立运营的服务器"
        },
        {
            date: "2026.03.14",
            title: "🎉服务器正式开放",
            desc: "全新地形模组，精简版轻蓝整合包，建筑者集结！"
        }
    ];
    
    // ======================== 渲染函数 ========================
    
    // 渲染柱状图排行榜
    function renderRanking() {
        const container = document.getElementById('rankContainer');
        if (!container) return;
        
        // 找出最大值用于计算百分比宽度
        const maxValue = Math.max(...rankData.map(item => item.value), 1);
        
        let html = '';
        rankData.forEach((item, index) => {
            const percent = (item.value / maxValue) * 100;
            html += `
                <div class="rank-item">
                    <div class="rank-number">${index + 1}</div>
                    <div class="rank-name">${escapeHtml(item.name)}</div>
                    <div class="bar-container">
                        <div class="bar-fill" style="width: ${percent}%;">
                            ${percent > 15 ? Math.round(percent) + '%' : ''}
                        </div>
                    </div>
                    <div class="rank-value">${item.value}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // 渲染新闻列表
    function renderNews() {
        const container = document.getElementById('newsContainer');
        if (!container) return;
        
        let html = '';
        newsData.forEach(news => {
            html += `
                <div class="news-item">
                    <div class="news-date">${escapeHtml(news.date)}</div>
                    <div class="news-title">${escapeHtml(news.title)}</div>
                    <div class="news-desc">${escapeHtml(news.desc)}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // 简单的防XSS函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // 初始化页面
    renderRanking();
    renderNews();
</script>
    <!-- MTR 线路图嵌入模块 -->
<div id="mtr-map-container" style="margin-top: 2rem; text-align: center; background: rgba(0,0,0,0.4); border-radius: 1.5rem; padding: 1rem;">
    <h3 style="margin-bottom: 1rem; font-size: 1.3rem; color: #ffd20c; display: flex; align-items: center; justify-content: center; gap: 8px;">
        🗺️ 线路图
    </h3>
    <div id="mtr-loading" style="padding: 2rem; color: #ffd20c;">🚇 正在加载线路图...</div>
    <div style="position: relative; width: 100%; padding-bottom: 75%; /* 4:3 比例 */ background: #0a0c12; border-radius: 1rem; overflow: hidden; display: none;" id="iframe-wrapper">
        <iframe id="mtr-iframe" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #0a0c12;"></iframe>
    </div>
    <div id="mtr-fallback" style="padding: 2rem; color: #ffa500; display: none;">⚠️ 线路图显示失败！请打开客户端以查看线路图</div>
</div>

<script>
    (function() {
        const iframe = document.getElementById('mtr-iframe');
        const loading = document.getElementById('mtr-loading');
        const fallback = document.getElementById('mtr-fallback');
        const wrapper = document.getElementById('iframe-wrapper');
        const url = 'http://localhost:1025/';

        fetch(url, { mode: 'no-cors', cache: 'no-store' })
            .then(() => {
                loading.style.display = 'none';
                wrapper.style.display = 'block';
                iframe.src = url;
            })
            .catch(() => {
                loading.style.display = 'none';
                fallback.style.display = 'block';
            });

        setTimeout(() => {
            if (loading.style.display !== 'none' && wrapper.style.display !== 'block' && fallback.style.display !== 'block') {
                loading.style.display = 'none';
                fallback.style.display = 'block';
            }
        }, 5000);
    })();
</script>
